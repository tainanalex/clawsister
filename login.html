<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蝦妹財金 - 內部存取控制</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .login-box { background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 15px; backdrop-filter: blur(10px); text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); width: 350px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #3498db; margin-bottom: 20px; }
        h2 { margin-bottom: 25px; color: #3498db; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 5px; border: none; outline: none; text-align: center; font-size: 1.1em; background: rgba(255,255,255,0.9); }
        button { width: 100%; padding: 12px; border-radius: 5px; border: none; background: #3498db; color: white; font-weight: bold; cursor: pointer; font-size: 1em; transition: 0.3s; }
        button:hover { background: #2980b9; transform: translateY(-2px); }
        .error { color: #e74c3c; margin-top: 15px; font-size: 0.9em; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="shamei_avatar.png" alt="蝦妹" class="avatar">
        <h2>💹 蝦妹內部系統</h2>
        <p style="margin-bottom: 20px; opacity: 0.8;">請輸入 Alex 哥專屬密碼</p>
        <input type="password" id="password" placeholder="請輸入密碼..." onkeydown="if(event.keyCode==13) verify()">
        <button onclick="verify()">確認進入 ✨</button>
        <div id="error" class="error">❌ 密碼錯誤，請再試一次喔！</div>
    </div>

    <script>
        function verify() {
            const pass = document.getElementById('password').value;
            // 這裡使用簡單的 Base64 編碼稍微隱藏密碼，防止直接被肉眼看穿 (LiLi2516169 -> TGlMaTI1MTYxNjk=)
            if (btoa(pass) === "TGlMaTI1MTYxNjk=") {
                sessionStorage.setItem('shamei_auth', 'true');
                window.location.href = 'index.html';
            } else {
                document.getElementById('error').style.display = 'block';
                document.getElementById('password').value = '';
            }
        }
    </script>
</body>
</html>
