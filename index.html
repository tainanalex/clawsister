
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蝦妹財金 - 登入</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fff0f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 2px solid #ffb6c1; max-width: 400px; width: 90%; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 5px solid #ff69b4; margin-bottom: 20px; object-fit: cover; }
        h2 { color: #db7093; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #ff69b4; color: white; border: none; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #ff1493; }
        .hint { color: #888; font-size: 0.85em; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="shamei_avatar.png" alt="蝦妹大頭貼" class="avatar">
        <h2>💹 蝦妹財金分析室 ✨🦞</h2>
        <p>Alex 哥，請輸入專屬密碼進場：</p>
        <input type="password" id="password" placeholder="請輸入密碼">
        <button onclick="login()">登入進場 💃</button>
        <p class="hint">© 2026 蝦妹財金助理</p>
    </div>

    <script>
        function login() {
            const pass = document.getElementById('password').value;
            // 密碼：LiLi2516169 (Base64: TGlMaTI1MTYxNjk=)
            if (btoa(pass) === 'TGlMaTI1MTYxNjk=') {
                sessionStorage.setItem('shamei_auth', 'true');
                window.location.href = 'main.html';
            } else {
                alert('密碼錯誤喔，Alex 哥！再試一次？😉');
            }
        }
    </script>
</body>
</html>
